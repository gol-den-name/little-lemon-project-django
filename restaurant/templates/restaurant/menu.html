{% extends 'restaurant/base.html' %}

{% block content %}
<div style="text-align: center;">
    <h1>Our Menu</h1>
    <hr style="border: 1px solid #495E57; width: 50px; margin-bottom: 30px;">

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        {% for item in menu_data %}
        <div style="border: 1px solid #ddd; padding: 20px; border-radius: 12px; background-color: #fffef2; box-shadow: 2px 2px 10px rgba(0,0,0,0.05);">
            <h3 style="color: #495E57; margin-bottom: 5px;">{{ item.name }}</h3>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">Freshly prepared daily</p>
            <span style="font-weight: bold; color: #EE9972; font-size: 1.2rem;">${{ item.price }}</span>
            <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">Inventory: {{ item.inventory }}</p>
        </div>
        {% empty %}
        <p>Our chefs are currently updating the menu. Please check back soon!</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
